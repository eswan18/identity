name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Don't worry, this is a key used only for testing.
      JWT_PRIVATE_KEY: |
        -----BEGIN EC PRIVATE KEY-----
        MHcCAQEEICQMNHONu2Sud2tu6jgOZs3LIj5yOZr89NBMLYiyqBK/oAoGCCqGSM49
        AwEHoUQDQgAERCHWHrX20emk31HypGNgptwBjdZOyBybV/9BLTbJPj8UsZ/46ri5
        /eFKkRfNApxFU/5lk1RGQJqt8t0GvkkJdw==
        -----END EC PRIVATE KEY-----
      JWT_ISSUER: http://localhost:8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: go mod verify

      # The generated *_templ.go files are committed (go build / the steps below
      # never run `templ generate`). Regenerate here and fail if anything drifts,
      # so a .templ edit that wasn't regenerated — or stale committed output —
      # can't slip through green CI. Pinned to the templ version in go.mod so the
      # generator output matches what produced the committed files.
      - name: Verify templ generation is up to date
        run: |
          go install github.com/a-h/templ/cmd/templ@v0.3.1020
          templ generate
          git diff --exit-code || { echo "::error::templ output is stale — run 'make templ' (or 'templ generate') and commit the result."; exit 1; }

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Run unit tests
        run: go test -v ./...

      # Integration tests are gated behind the `integration` build tag. They use
      # testcontainers to spin up Postgres/MinIO, which relies on the Docker
      # daemon available on GitHub-hosted ubuntu runners. Scoped to the package
      # that holds them and to the suite entrypoints so the untagged unit tests
      # (already run above) aren't rebuilt and re-run a second time.
      - name: Run integration tests
        run: go test -v -tags integration -timeout 600s -run 'TestOAuthFlowSuite|TestAvatarFlowSuite' ./pkg/httpserver/
