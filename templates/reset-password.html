{{define "title"}}Reset Password{{end}}

{{define "content"}}
            <div class="text-center mb-8">
                <h1 class="card-title justify-center text-2xl">Reset Password</h1>
                <p class="text-sm text-base-content/60">Enter your new password</p>
            </div>

            {{if .Error}}
            {{template "alert-error" .}}
            {{end}}

            <form method="POST" action="/oauth/reset-password">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <input type="hidden" name="token" value="{{.Token}}">

                <fieldset class="fieldset mb-4">
                    <label class="fieldset-label" for="new_password">New Password</label>
                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        placeholder="Enter your new password"
                        required
                        autofocus
                        autocomplete="new-password"
                        class="input input-bordered w-full"
                    >
                </fieldset>

                <fieldset class="fieldset mb-4">
                    <label class="fieldset-label" for="confirm_password">Confirm New Password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirm your new password"
                        required
                        autocomplete="new-password"
                        class="input input-bordered w-full"
                    >
                </fieldset>

                <button type="submit" class="btn btn-primary w-full">Reset Password</button>
            </form>

            <div class="text-center mt-6 text-sm text-base-content/60">
                Remember your password? <a href="/oauth/login" class="link link-primary">Sign in</a>
            </div>

            {{template "footer" .}}
{{end}}
