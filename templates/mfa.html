{{define "title"}}Two-Factor Authentication{{end}}

{{define "content"}}
            <div class="text-center mb-8">
                <h1 class="card-title justify-center text-2xl">Two-Factor Authentication</h1>
                <p class="text-sm text-base-content/60">Enter the code from your authenticator app</p>
            </div>

            {{if .Error}}
            {{template "alert-error" .}}
            {{end}}

            <form method="POST" action="/oauth/mfa">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <fieldset class="fieldset mb-4">
                    <label class="fieldset-label" for="code">Verification Code</label>
                    <input
                        type="text"
                        id="code"
                        name="code"
                        placeholder="Enter 6-digit code"
                        required
                        autofocus
                        autocomplete="one-time-code"
                        inputmode="numeric"
                        pattern="[0-9]{6}"
                        maxlength="6"
                        class="input input-bordered w-full text-center text-2xl tracking-widest"
                    >
                </fieldset>

                <input type="hidden" name="pending_id" value="{{.PendingID}}">
                <input type="hidden" name="client_id" value="{{.ClientID}}">
                <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
                <input type="hidden" name="state" value="{{.State}}">
                <input type="hidden" name="scope" value="{{range $i, $s := .Scope}}{{if $i}} {{end}}{{$s}}{{end}}">
                <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
                <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
                <input type="hidden" name="nonce" value="{{.Nonce}}">

                <button type="submit" class="btn btn-primary w-full">Verify</button>
            </form>

            <div class="text-center mt-6 text-sm text-base-content/60">
                <a href="/oauth/login" class="link link-primary">Back to login</a>
            </div>

            {{template "footer" .}}
{{end}}
