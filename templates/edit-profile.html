{{define "title"}}Edit Profile{{end}}

{{define "content"}}
            <div class="text-center mb-8">
                <h1 class="card-title justify-center text-2xl">Edit Profile</h1>
                <p class="text-sm text-base-content/60">Update your profile information</p>
            </div>

            {{if .Error}}
            {{template "alert-error" .}}
            {{end}}

            {{if .Success}}
            {{template "alert-success" .}}
            {{end}}

            <form method="POST" action="/oauth/edit-profile">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <fieldset class="fieldset mb-4">
                    <label class="fieldset-label" for="given_name">First Name</label>
                    <input
                        type="text"
                        id="given_name"
                        name="given_name"
                        placeholder="First name"
                        value="{{.GivenName}}"
                        autocomplete="given-name"
                        class="input input-bordered w-full"
                    >
                </fieldset>

                <fieldset class="fieldset mb-4">
                    <label class="fieldset-label" for="family_name">Last Name</label>
                    <input
                        type="text"
                        id="family_name"
                        name="family_name"
                        placeholder="Last name"
                        value="{{.FamilyName}}"
                        autocomplete="family-name"
                        class="input input-bordered w-full"
                    >
                </fieldset>

                <button type="submit" class="btn btn-primary w-full">Save Profile</button>
            </form>

            <a href="/oauth/account-settings" class="btn btn-ghost w-full mt-3">Back to Account Settings</a>

            {{template "footer" .}}
{{end}}
